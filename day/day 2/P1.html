<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tag</title>
    <style>
        .responsive-image{
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>
    <!-- self closing tag -->
    <img src="OIP.jpg" alt="could not find a image">
    <br>
    <!-- commonly used attributes -->
    <img src="OIP.jpg" alt="bike" width="300px" height="190" title="image of  bike" style="border-radius: 50%;">
    <!-- style -->
    <br>
    <img src="OIP.jpg" alt="bike" width="300px" height="190" style="border-radius:50px;  border:5px solid grey;">
    <br>
    <img src="jpj.jpg" alt="" width="300px" height="190" class="responsive-image">
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Container Properties</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        section {
            margin-bottom: 40px;
        }

        /* Common box style */
        .box {
            background-color: burlywood;
            padding: 15px;
            text-align: center;
            border: 1px solid black;
        }

        /* ===========================
           Basic Grid
        =========================== */
        .basic-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 90px);

            background-color: cadetblue;
            padding: 20px;
            border: 2px solid black;

            row-gap: 10px;
            column-gap: 20px;
        }

        /* ===========================
           justify-content &
           align-content
        =========================== */
        .grid2 {
            display: grid;

            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(2, 90px);

            width: 500px;
            height: 300px;

            justify-content: center;
            align-content: center;

            gap: 12px;

            background-color: rgb(217, 197, 243);
            border: 2px solid black;
            padding: 10px;
        }

        /* ===========================
           justify-items &
           align-items
        =========================== */
        .grid3 {
            display: grid;

            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 90px);

            justify-items: center;
            align-items: center;

            gap: 10px;

            background-color: rgb(237, 118, 79);
            border: 2px solid black;
            padding: 20px;
        }
    </style>
</head>

<body>

    <!-- Basic Grid -->
    <section>
        <h2>Basic Grid</h2>
        <br>

        <div class="basic-grid">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </section>

    <!-- justify-content & align-content -->
    <section>
        <h2>justify-content & align-content</h2>
        <br>

        <div class="grid2">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </section>

    <!-- justify-items & align-items -->
    <section>
        <h2>justify-items & align-items</h2>
        <br>

        <div class="grid3">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
            <div class="box">4</div>
            <div class="box">5</div>
            <div class="box">6</div>
        </div>
    </section>

</body>

</html>

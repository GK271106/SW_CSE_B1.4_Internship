<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox : justify-wrap  & align item  and gap</title>
        <style>
            .container{
                display: flex;
                border: 2px solid black;
                padding: 10px;
                gap: 10px;
                flex-wrap: wrap-reverse; /* wrap | nowrap | wrap-reverse*/
                align-content: center;/* flex start | flex end | center | spacebetween | spacearound | space evenly*/
            }
            .item{
                background-color:rgb(95, 209, 209);
                padding: 15px;
                min-width: 150px;
            }
            .container1{
                display: flex;
                border: 2px solid black;
                padding: 10px;
                gap: 10px;
                height : 200px;
                align-items: flex-end;/* center | stretch | flex-start | flex-end | baseline */
            }
            .item1{
                background-color:rgba(235, 17, 24, 0.388);
                padding: 15px;
            }
        </style>
</head>

<body>
    <div class="container">
        <div class="item">item1</div>
        <div class="item">item2</div>
        <div class="item">item3</div>
        <div class="item">item4</div>
        <div class="item">item5</div>
        <div class="item">item6</div>
        <div class="item">item7</div>
        <div class="item">item8</div>
    </div>
     <div class="container1">
        <div class="item1">item1</div>
        <div class="item1">item2</div>
        <div class="item1">item3</div>
    </div>
</body>

</html>

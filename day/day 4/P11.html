<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>child selector</title>
    <style>
        ul>li{
            color: green;
            background-color: cadetblue;
        }
    </style>
</head>
<body>
    <p>targets element that are direct children (one level down)</p>
    <h1>heading one</h1>
    <ul>
        <li>laptop</li>
        <li>mobile</li>
        <li>tab</li>
    </ul>
</body>
</html>

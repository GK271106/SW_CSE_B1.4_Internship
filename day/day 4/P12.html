<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibling selector
    </title>
    <style>
        /* apply only for the first one */
        h1+p {
            color: red;
            background-color: blanchedalmond;
        }

        /* ~ applies for all the paaraa */
        h2~p {
            color: blue;
            background-color: grey;
        }
    </style>
</head>

<body>
    <p>sibling: the very next element</p>
    <h1>heading one</h1>
    <p>para after h1</p>
    <p>here style is not applied</p>
    <h2>hello guys</h2>
    <p>another paragraph</p>
    <p>it is a another para</p>

</body>

</html>

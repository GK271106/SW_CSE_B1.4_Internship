<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-element selector</title>
    <style>
       p::first-letter{
        font-size: 300%;
       }
       p::first-line{
        font-weight: bold;
       }
    </style>
</head>

<body>
    <p>pseudo-element selector: style parts of an element</p>
    <h1>heading one</h1>
    <p>This is a paragraph</p>

</body>

</html>

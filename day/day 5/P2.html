<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo-class selector</title>
    <style>
        a:hover{
            color:red;
            text-decoration: underline;
            background-color:  pink;
        }
    input:focus{
        outline:4px solid yellow;
    }

    </style>
</head>
<body>
    <p>pseudo-class selector: select element in a certain state(hovered, focused, first child)</p>
    <h1>heading one</h1>
    <a href="https://google.com">take me to google</a> <br>
    <input type="text" name="" id="">
    
</body>
</html>

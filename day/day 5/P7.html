<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors</title>
    <style>
        /* HSL colors : hue[0 -360] */
        p{
            color: hsl(276, 99%, 49%);
        }
        h2{
             color: hsl(77, 99%, 49%)
        }
    </style>
</head>
<body>
    <p>paragraph</p>
    <h2>heading 2</h2>
</body>
</html>

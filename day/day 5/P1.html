<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute selector</title>
    <style>
     a[href^="https"]{
        color: brown;
        background-color: rgb(11, 244, 252);
     }
     input[type="text"]{
        border: 2px solid navy;
     }

    </style>
</head>
<body>
    <p>Attribute selector: select based the HTML attributes and  values</p>
    <h1>heading one</h1>
    <a href="https://google.com">take me to google</a> <br>
    <input type="text" name="" id="">
    
</body>
</html>

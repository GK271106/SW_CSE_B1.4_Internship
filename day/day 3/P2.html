<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Row and column span</title>
</head>

<body>
    <table border="1">
        <caption>Monthly saving report</caption>
        <tr>
            <th colspan="2">Details</th>
        </tr>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jan</td>
            <td>19000</td>
        </tr>
        <tr>
            <td>Feb</td>
            <td>23000</td>
        </tr>

    </table>
    <table border="1">
        <tr>
            <th colspan="3">student details</th>
        </tr>
        <tr>
            <td>name</td>
            <td>guru kiran</td>
        </tr>
        <tr>
            <td>course</td>
            <td>web developer</td>
            <td>gen Ai</td>
        </tr>
    </table>
    <p>Rowspan</p>
    <table border="1">
        <tr>
            <th rowspan="2">Day</th>
            <th>Morning</th>
            <th>Evening</th>
        </tr>
        <tr>
            <td>frontend learning</td>
            <td>frontend practice</td>
        </tr>

    </table>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video tag</title>
</head>

<body>
    <p>Video Tag</p>
    <video src="sample-5s-360p.mp4" controls="" >your browser does not support video</video>
   <video src="sample-5s-360p.webm"> your brosewr do not support this</video>

    <!-- width height and auto play -->
    <video src="sample-5s-360p.mp4" controls="" width="480px" height="320" autoplay>your browser does not support
        video</video>

    <!-- MUTE AND LOOP -->
    <video src="sample-5s-360p.mp4" controls="" width="480px" height="320" autoplay loop>your browser does not support
        video</video>

    <!-- POSTRER -->
    <video src="sample-5s-360p.mp4" poster="OIP (1).jpg"   controls="" width="480px" height="320" autoplay>your browser does not support
        video</video>

    <!-- preload -->
    <!-- none : dont preload the video load only when user starts to play it -->
    <!-- meta data : load only information like duration ,dimention and etc -->
    <!-- auto:browser load video immediatly -->
    <video src="sample-5s-360p.mp4" poster="OIP (1).jpg" controls="" width="480px" height="320" preload="none">your browser does not
        support
        video</video>


</html>

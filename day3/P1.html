<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>
    <p>HTML Tables</p>
    <p> tr : table rows <br>
        th : table heading <br>
        td : table data
    </p>
    <table border="1">
        <caption>Monthly saving report</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jan</td>
            <td>19000</td>
        </tr>
        <tr>
            <td>Feb</td>
            <td>23000</td>
        </tr>

    </table>
    <table border="1">
        <caption>sales data</caption>
        <thead>
            <tr>
                <th>month</th>
                <th>sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>jan</td>
                <td>30000</td>
            </tr>
            <tr>
                <td>feb</td>
                <td>90000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>total</td>
                <td>120000</td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
